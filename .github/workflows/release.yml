name: Build Release Binaries

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      version:
        description: 'Version string (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Inject Version Metadata
        run: |
          (Get-Content version_info.txt) -replace "1\.0\.0", "${{ github.event.inputs.version }}" | Set-Content version_info.txt
          (Get-Content gui_main.py) -replace "Version 1\.0\.0", "Version ${{ github.event.inputs.version }}" | Set-Content gui_main.py

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyInstaller
          if (Test-Path -Path 'requirements.txt') { pip install -r requirements.txt }

      - name: Build Windows Executable
        run: |
          python build.py
          Rename-Item -Path "dist\lce2je.exe" -NewName "lce2je_v${{ github.event.inputs.version }}.exe"

      - name: Upload Windows Asset
        uses: actions/upload-artifact@v4
        with:
          name: lce2je-windows
          path: dist/lce2je_v${{ github.event.inputs.version }}.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Inject Version Metadata
        run: |
          sed -i 's/1\.0\.0/${{ github.event.inputs.version }}/g' version_info.txt
          sed -i 's/Version 1\.0\.0/Version ${{ github.event.inputs.version }}/g' gui_main.py

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-x11-0 libxcb-render-util0 libxcb-icccm4 libxcb-shape0 libxcb-xkb1 libxcb-keysyms1 libxcb-util1 libxcb-cursor0 libxcb-image0
          python -m pip install --upgrade pip
          pip install PyQt6 PyInstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build Linux Binary
        run: |
          python build.py
          mv dist/lce2je dist/lce2je_v${{ github.event.inputs.version }}_linux
          
      - name: Upload Linux Asset
        uses: actions/upload-artifact@v4
        with:
          name: lce2je-linux
          path: dist/lce2je_v${{ github.event.inputs.version }}_linux

  create-release:
    needs: [build-windows, build-linux]
    if: github.event.inputs.build_type == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: lce2je-windows
          path: ./release-assets

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: lce2je-linux
          path: ./release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: lce2je v${{ github.event.inputs.version }}
          files: |
            ./release-assets/lce2je_v${{ github.event.inputs.version }}.exe
            ./release-assets/lce2je_v${{ github.event.inputs.version }}_linux
          generate_release_notes: true
